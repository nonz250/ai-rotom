name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Type check / Test / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p packages/mcp-server/tsconfig.json

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist has no unbundled @smogon/calc references
        run: bash scripts/verify-dist-bundle.sh

      - name: Run dist bundle smoke tests
        run: npm run test:dist
